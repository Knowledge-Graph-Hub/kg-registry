---
id: https://w3id.org/knowledge-graph-hub/kg_registry_schema
name: kg_registry_schema
title: kg_registry_schema
description: |-
  A schema for representing metadata about
  knowledge graphs, their sources, and their contents.
license: GPL-3.0
see_also:
  - https://kghub.org/kg-registry/
version: 0.0.4

prefixes:
  kgr: https://w3id.org/bridge2ai/data-sheets-schema/
  skos: http://www.w3.org/2004/02/skos/core#
  linkml: https://w3id.org/linkml/
  dcterms: http://purl.org/dc/terms/
  prov: http://www.w3.org/ns/prov#
  MESH: http://id.nlm.nih.gov/mesh/
  NCIT: http://purl.obolibrary.org/obo/NCIT_

default_prefix: kgr
default_range: string

imports:
  - linkml:types
  - kg_registry_schema_formats

classes:

  ## Top-level Classes

  NamedThing:
    description: >-
      A generic grouping for any identifiable entity
    slots:
      - id
      - category
      - warnings
      - collection
      - layout
      - creation_date
      - last_modified_date
    class_uri: schema:Thing

  Registry:
    description: >-
      A registry of knowledge graphs and their components.
    slots:
      - resources

  Contact:
    description: >-
      A contact point for a resource or product,
      or a curator of a resource or product.
    slots:
      - category
      - contact_details

  ## Resource Classes

  Resource:
    is_a: NamedThing
    description: >-
      A top-level class for all resources in the
      knowledge graph registry. Each resource may have multiple
      products or representations, but they will all be considered
      part of a the same parent resource.
    close_mappings:
      - schema:CreativeWork
    slot_usage:
      layout:
        required: true
    attributes:
      activity_status:
        description: >-
          The status of the resource.
        range: ActivityStatusEnum
      name:
        description: >-
          The human-readable name of the resource.
        required: true
        range: string
      description:
        description: >-
          A description of the resource.
        range: string
      homepage_url:
        description: >-
          The primary URL of the resource. This may be a link
          to download a specific file, a base URL to an API,
          or a link to a graphical interface, but it should
          preferentially be the main page documenting the
          resource.
        range: uriorcurie
      repository:
        description: >-
          A main version control repository for the resource.
          Specific products may have their own repositories.
        range: uriorcurie
      license:
        description: >-
          The license of the resource.
          Individual products may have their own licenses.
        range: License
        inlined: true
      version:
        description: The version of the resource.
        range: string
        exact_mappings:
          - schema:version
          - dcterms:hasVersion
      language:
        description: >-
          The human language of the resource.
        range: string
      contacts:
        description: >-
          The contact point(s) for the resource.
          May be an individual or organization.
        range: Contact
        multivalued: true
        inlined: true
        inlined_as_list: true
      curators:
        description: >-
          The curator(s) of the resource.
          May be an individual or organization.
        range: Contact
        multivalued: true
        inlined: true
        inlined_as_list: true
      products:
        description: >-
          The products or representations of the resource.
        range: Product
        multivalued: true
        inlined: true
        inlined_as_list: true
      domains:
        description: >-
          The domain(s) that the resource is relevant to.
        range: DomainEnum
        required: true
        multivalued: true
      tags:
        description: Tags associated with the resource.
        range: TagEnum
        multivalued: true
      funding:
        description: >-
          The funding source(s) for the resource.
        range: FundingSource
        multivalued: true
      publications:
        description: >-
          Publications associated with the resource.
        range: Publication
        multivalued: true
        inlined: true
        inlined_as_list: true
      usages:
        description: >-
          The usage(s) of the resource.
        range: Usage
        multivalued: true
        inlined: true
        inlined_as_list: true
      fairsharing_id:
        description: >-
          The FAIRsharing ID of the resource.
        range: string
      infores_id:
        description: >-
          The Infores ID of the resource.
          Do not include the 'infores' prefix.
        range: string
      taxon:
        description: >-
          The taxon or taxa that the resource is relevant to.
          This is preferably an NCBI Taxonomy identifier,
          in CURIE format.
        range: uriorcurie
        multivalued: true
      synonyms:
        description: >-
          A list of synonyms for the resource.
          These may include acronyms, abbreviations, or
          other alternate names for the resource.
          They are not necessarily unique across resources.
        range: string
        multivalued: true

  KnowledgeGraph:
    description: >-
      A knowledge graph resource. This is any heterogeneous collection of data
      that is represented as nodes (entities) and edges (relationships) between
      them. The nodes and edges may have attributes associated with them.
      This is not identical to the graph *product*, as a single KnowledgeGraph
      may have multiple products or representations.
    aliases:
      - kg
      - heterogeneous graph
    is_a: Resource
    attributes:
      creator:
        description: >-
          The person or organization responsible for
          creating the knowledge graph.
        range: string
      date_created:
        description: The date the knowledge graph was created.
        range: string
      date_modified:
        description: The date the knowledge graph was last modified.
        range: string
      contributors:
        description: Contributors to the knowledge graph.
        range: string
      components:
        description: The components of the knowledge graph.
        range: Resource
        multivalued: true

  DataSource:
    description: >-
      A data source. One data source may have multiple products.
    is_a: Resource

  DataModel:
    description: >-
      A data model is a formal representation of
      concepts and relationships within a specific domain.
      It defines the structure and organization of data,
      including entities, attributes, and relationships.
      May be used in construction of a knowledge graph.
    is_a: Resource

  Ontology:
    description: >-
      An ontology is a formal representation of a set of concepts
      within a domain and the relationships between those concepts.
      It is used to reason about the properties of that domain
      and may be used in construction of a knowledge graph.
    is_a: Resource

  Aggregator:
    description: >-
      An aggregator of data sources.
      Note that this may be a data source itself,
      and its products may undergo changes
      in the process of their inclusion in the aggregator.
    is_a: Resource

  ## Product Classes

  Product:
    is_a: NamedThing
    description: >-
      A top-level class for all products in the
      knowledge graph registry. This includes any specific
      files, APIs, or any other accessible representations of
      a resource.
    attributes:
      name:
        description: >-
          The human-readable name of the product.
        required: true
        range: string
      description:
        description: >-
          A description of the product.
        range: string
      original_source:
        description: >-
          The original source(s) of the product, with the
          provenance relation describing how the product relates
          to each source.
          This may be the parent resource or another resource.
          This may also be a specific product.
        range: SourceAssociation
        multivalued: true
        inlined: true
        inlined_as_list: true
      secondary_source:
        description: >-
          The source(s) of the product, other than its original
          source, with the provenance relation describing how the
          product relates to each source.
          This may be an Aggregator or another resource.
          This may also be a specific product.
        range: SourceAssociation
        multivalued: true
        inlined: true
        inlined_as_list: true
      product_url:
        description: >-
          The URL of the product. This may be a link
          to download a specific file, a base URL to an API,
          or a link to a graphical interface.
        range: uriorcurie
      product_file_size:
        description: >-
          The size of the product file, in bytes.
          The build process will attempt to determine this
          based on the file header and populate the metadata
          where possible.
        range: integer
      produced_by:
        description: >-
          The process(es) that produced the product,
          referred to by the identifier of each process.
        range: ProcessProduct
        multivalued: true
      repository:
        description: >-
          A main version control repository for the product.
        range: uriorcurie
      license:
        description: >-
          The license of the product.
          This may differ from that of the parent resource.
        range: License
        inlined: true
      compression:
        description: >-
          The type of compression used with the product.
          If this is not specified, it is assumed to be uncompressed.
        range: CompressionEnum
      contacts:
        description: >-
          The contact points for the product.
          May be an individual or organization.
        range: Contact
        multivalued: true
      curators:
        description: >-
          The curator(s) of the product.
          May be an individual or organization.
        range: Contact
        multivalued: true
      tags:
        description: Tags associated with the product.
        range: TagEnum
        multivalued: true
      infores_id:
        description: >-
          The Infores ID of the product.
          Do not include the 'infores' prefix.
        range: string
      compatibility:
        description: >-
          A list of standards that the product conforms to.
          This is not the same as its serialization/format.
        range: StandardCompatibility
        multivalued: true
        inlined: true
      format:
        description: >-
          The format or serialization of the product.
          Generally corresponds to the file extension.
        range: FormatEnum
      dump_format:
        description: >-
          The format of a dump of the product as a file.
          Note the product may also be compressed.
        range: DumpFormatEnum
      versions:
        description: A list of names of versions of the product.
        range: string
        multivalued: true
        exact_mappings:
          - schema:version
          - dcterms:hasVersion
      latest_version:
        description: >-
          The latest version of the product, or the most recent
          version curated in the registry.
          If the product is available at a permanent link,
          this may be something like "latest".
        range: string

  GraphProduct:
    description: >-
      A product that is a graph, represented as nodes and edges.
    is_a: Product
    attributes:
      edge_count:
        description: The number of edges in the graph.
        range: integer
      node_count:
        description: The number of nodes in the graph.
        range: integer
      predicates:
        description: The predicate types in the graph.
        range: string
        multivalued: true
      node_categories:
        description: The node categories in the graph.
        range: string
        multivalued: true

  DataModelProduct:
    description: >-
      A product that provides the rules of a data model.
    is_a: Product

  OntologyProduct:
    description: >-
      A product that is an ontology, a formal representation of
      a set of concepts within a domain and the relationships between those concepts.
    is_a: Product

  MappingProduct:
    description: >-
      A product that is a mapping between two or more data sources.
      The sources should be identified in the original_source field.
    is_a: Product

  ProcessProduct:
    description: >-
      A product that is a process or algorithm.
    is_a: Product

  GraphicalInterface:
    description: >-
      A product that is a graphical interface to a resource.
      Similar to the "browsers" field in OBO Foundry.
    is_a: Product

  ProgrammingInterface:
    description: >-
      A product that is a programming interface (API) to a resource.
    is_a: Product
    attributes:
      is_public:
        description: >-
          Whether the API is publicly accessible,
          or requires only publicly provided credentials.
        range: boolean
      is_neo4j:
        description: >-
          Whether the API is for a Neo4j database.
        range: boolean
      connection_url:
        description: >-
          A URL specific to the product.
          For example, a URL to a specific Neo4j database.
          Do not include a prefix.
        range: uriorcurie

  DocumentationProduct:
    description: >-
      A product that is documentation for a resource.
      This may be a website, a stand-alone document,
      or a collection of documents.
    is_a: Product


  ## Other Classes

  ContactDetails:
    description: >-
      A field for details about how to
      contact a person or organization.
    attributes:
      contact_type:
        description: >-
          The type of contact detail.
        range: ContactTypeEnum
        required: true
      contact_type_name:
        description: >-
          The name of the contact detail,
          if the contact_type is "other".
          For example, if the contact value
          is a username at the Gumball Project's
          GitLab, this may be "Gumball Project GitLab".
        range: string
      contact_type_url:
        description: >-
          The URL of the contact detail,
          if the contact_type is "other".
          For example, if the contact value
          is a username at the Gumball Project's
          GitLab, this may be "https://gitlab.gumballproject.org/".
        range: uriorcurie
      value:
        description: >-
          The value of the contact detail.
          For example, an email address or URL.
          Do not include a prefix.
        range: string
        required: true

  SourceAssociation:
    description: >-
      A typed provenance association from a product to another
      resource or product that served as a source, input, influence,
      or other provenance-related contributor.
    attributes:
      source:
        description: >-
          The identifier of the resource or product that is related
          to the product through this provenance association.
        range: NamedThing
        any_of:
          - range: Resource
          - range: Product
        required: true
      relation_type:
        description: >-
          The PROV-O relation type that describes how the product
          is related to the source.
        range: ProvenanceRelationEnum
        required: true

  Individual:
    description: >-
      An individual person.
    is_a: Contact
    attributes:
      label:
        description: >-
          The name of the individual.
        range: string
      orcid:
        description: >-
          The ORCID of the individual.
          Do not include the "https://orcid.org/" prefix.
        range: string
        pattern: "^\\d{4}-\\d{4}-\\d{4}-\\d{3}(\\d|X)$"

  Organization:
    description: >-
      An organization.
    is_a: Contact
    slots:
      - id
      - layout
      - creation_date
      - last_modified_date
    attributes:
      label:
        description: >-
          The name of the organization.
        range: string
      short_id:
        description: >-
          A short identifier for the organization.
          This may be an acronym or abbreviation.
        range: string
      description:
        description: >-
          A description of the organization.
        range: string
      homepage_url:
        description: >-
          The homepage URL of the organization.
        range: uriorcurie
      github_url:
        description: >-
          The GitHub URL of the organization.
        range: uriorcurie

  FundingSource:
    is_a: NamedThing
    description: >-
      A funding source for a resource.
    attributes:
      label:
        description: >-
          The organization providing the funding.
        range: Organization

  License:
    is_a: NamedThing
    description: >-
      A license for a resource or product.
      The id field should be a URL to the
      license text, e.g.,
      https://creativecommons.org/licenses/by/4.0/
    attributes:
      label:
        description: >-
          The name of the license.
        range: string
      logo:
        description: >-
          The URL of a logo for the license.
          This is added at metadata parsing time.
        range: uriorcurie

  Publication:
    is_a: NamedThing
    description: >-
      A publication associated with a resource.
      Its id should be in CURIE format,
      so it may be a DOI (with prefix) or a URL.
    attributes:
      preferred:
        description: >-
          Whether this is the preferred publication for the resource.
        range: boolean
      title:
        description: >-
          The title of the publication.
        range: string
      authors:
        description: >-
          The authors of the publication.
        range: string
        multivalued: true
      journal:
        description: >-
          The journal the publication was published in.
        range: string
      year:
        description: >-
          The year the publication was published.
        range: string
      doi:
        description: >-
          The DOI of the publication.
          This does not need to include a prefix of any kind,
          as it will be formatted as a URL.
        range: uriorcurie

  Usage:
    is_a: NamedThing
    description: >-
      The usage of a resource.
      This may be actual, experimental, or theoretical.
    attributes:
      label:
        description: >-
          The label of the usage.
        range: string
      description:
        description: >-
          A description of the usage.
        range: string
      url:
        description: >-
          A URL for a description or example of the usage.
        range: uriorcurie
      users:
        description: >-
          The user implementing or working with the resource.
        range: Contact
        multivalued: true
        inlined: true
        inlined_as_list: true
      publications:
        description: >-
          Publications associated with the usage.
        range: Publication
        multivalued: true
        inlined: true
        inlined_as_list: true
      type:
        description: >-
          The type of usage.
        range: UsageEnum

  StandardCompatibility:
    description: >-
      Details about the compatibility of a product with a
      particular standard, including data models such as
      Biolink Model and graph standards such as KGX.
    attributes:
      standard:
        description: >-
          The name of the standard that the product is
          compatible with.
        range: StandardEnum
      version:
        description: >-
          If applicable, the most recent version of the
          standard that the product is
          known to be compatible with, e.g., 4.2.5
        range: string

# Slots
slots:
  id:
    description: >-
      The identifier of an entity.
      This is used to identify it within the registry.
    required: true
    range: string
    identifier: true
    slot_uri: dcterms:identifier
  # Note: this should designate the type,
  # but inheritance isn't working as expected
  # as of Feb 12 2025
  category:
    is_a: type
    domain: NamedThing
    range: category_type
    # designates_type: true
    # is_class_field: true
    description: >-
      The category of the entity.
      This should be identical to its class name.
  contact_details:
    description: >-
      A field for contact details, including
      email, GitHub, and contact-specific URLs.
    range: ContactDetails
    inlined: true
    inlined_as_list: true
    multivalued: true
  resources:
    description: A list of entries in the registry.
    range: Resource
    inlined: true
    inlined_as_list: true
    multivalued: true
  warnings:
    description: >-
      A list of warnings about an item to be displayed
      in the interface. These should primarily warn
      users about unavailable resources, broken links,
      and other obstacles to using a resource.
    range: string
    inlined: true
    inlined_as_list: true
    multivalued: true
  layout:
    description: >-
      The layout of the entity.
      This is used to determine how to display the
      entity in the web interface.
      For resources, this is generally 'resource_detail'.
      For products, this is generally 'product_detail'.
      If a value for this slot is not specified,
      pages won't contain anything from their
      header metadata.
    range: string
  collection:
    description: >-
      A collection of entries in the registry.
      This is used to group related entries together.
      This is multivalued to allow for multiple collections.
    range: CollectionEnum
    multivalued: true
  creation_date:
    description: >-
      The date the entry was created.
      This is used to determine the age of the entity.
      It should be in ISO 8601 format, e.g., 2024-02-12T00:00:00Z.
    range: datetime
  last_modified_date:
    description: >-
      The date the entry was last modified.
      It should be in ISO 8601 format, e.g., 2024-02-12T00:00:00Z.
    range: datetime

# Types
types:
  category_type:
    typeof: string
    description: >-
      A primitive type in which the value denotes a class within the model.

# Enums
enums:
  ActivityStatusEnum:
    description: >-
      The status of a resource.
      Corresponds to those used by OBO Foundry.
    permissible_values:
      active:
        description: >-
          The resource is active and available.
      inactive:
        description: >-
          The resource is inactive.
          Its availability may vary.
      orphaned:
        description: >-
          The resource is not actively maintained.
          Its availability may vary.
      unresponsive:
        description: >-
          The resource is no longer accessible.
          Only its metadata is available.
      unknown:
        description: >-
          The status of the resource is unknown.

  ProvenanceRelationEnum:
    description: >-
      PROV-O relation types used to describe how a product is
      related to a resource or product source.
    permissible_values:
      prov:hadPrimarySource:
        description: >-
          The source is a primary source for this product.
          This is the default relation type for original_source
          associations.
        meaning: prov:hadPrimarySource
      prov:wasDerivedFrom:
        description: >-
          The product was derived from, transformed from, updated
          from, or constructed based on the source.
        meaning: prov:wasDerivedFrom
      prov:wasInfluencedBy:
        description: >-
          The product was influenced by the source in a broad
          provenance sense. This is the default relation type for
          secondary_source associations when a more specific PROV-O
          relation is not known.
        meaning: prov:wasInfluencedBy
      prov:wasInformedBy:
        description: >-
          The product was informed by the source, for cases where
          information from the source affected the product without
          implying direct derivation.
        meaning: prov:wasInformedBy
      prov:used:
        description: >-
          The product was produced by an activity that used the
          source as an input, reference, ontology, vocabulary, or
          other entity.
        meaning: prov:used

  CompressionEnum:
    description: >-
      The type of compression used with a product.
    permissible_values:
      gpickle:
        description: >-
          The gpickle format, or the output of
          pickling a NetworkX graph object.
          This file ends in .gpickle.
      gzip:
        description: The gzip compression algorithm.
          This file ends in .gz.
      pickle:
        description: >-
          The pickle format, or the output of
          pickling a Python object.
          This file ends in .pkl or .pickle.
      tar:
        description: The tar archive format.
          This file ends in .tar.
      targz:
        description: A tar archive that is also gzip compressed.
          This file ends in .tar.gz.
      rar:
        description: The rar archive format.
          This file ends in .rar.
      zip:
        description: The zip archive format.
          This file ends in .zip.
      7z:
        description: The 7z archive format.
          This file ends in .7z.
      other:
        description: Another compression format not defined here.

  ContactTypeEnum:
    description: >-
      The type of contact detail.
    permissible_values:
      email:
        description: >-
          An email address for the contact.
      github:
        description: >-
          A GitHub username for the contact.
      url:
        description: >-
          A URL for the contact. For an individual, this may be
          a profile on an official website. For an organization,
          this may be a link to the organization's site or
          a documentation landing page.
      other:
        description: Another type of contact detail not defined here.

  DomainEnum:
    description: >-
      A domain that a resource is relevant to. Each domain maps,
      where possible, to a concept in an external controlled
      vocabulary (Medical Subject Headings, MeSH; or the NCI
      Thesaurus, NCIT) via the permissible value's `meaning`.
    permissible_values:
      agriculture:
        description: >-
          The agricultural and food sciences, including crop and
          animal production, plant science, and food production,
          processing, and preservation.
        meaning: MESH:D000383
      anatomy and development:
        description: >-
          The anatomy and development of organisms, including their
          structure, morphology, and developmental biology.
        meaning: MESH:D000715
      biological systems:
        description: >-
          The biological sciences broadly, including cellular and
          molecular biology and other biological disciplines not
          better described by a more specific domain.
        meaning: MESH:D001690
      biomedical:
        description: >-
          The biomedical sciences broadly, spanning the study of
          biological systems in the context of health and disease.
          Use a more specific domain (e.g., clinical) where one applies.
        meaning: MESH:D035843
      chemistry and biochemistry:
        description: >-
          The chemical and biochemical sciences, including the
          structure, properties, and reactions of chemical compounds.
        meaning: MESH:D002621
      clinical:
        description: >-
          The clinical sciences concerned with the care of patients,
          including clinical trials, patient data, and diagnosis and
          treatment of disease.
        meaning: MESH:D015510
      drug discovery:
        description: >-
          The process of identifying and developing new candidate medications, including
          target identification, validation, and compound screening.
        meaning: MESH:D055808
      environment:
        description: >-
          The environment and ecosystems, including ecology and
          environmental health.
        meaning: MESH:D004777
      general:
        description: >-
          A general domain, not specific to any other category.
          It concerns resources that are broadly applicable across
          multiple domains, including upper-level and cross-domain
          resources.
      genomics:
        description: >-
          The study of genomes, including genome structure, evolution,
          function, mapping, and editing.
        meaning: MESH:D023281
      immunology:
        description: >-
          The study of the immune system, including its structure and function,
          disorders, and therapeutic applications.
        meaning: MESH:D000486
      information technology:
        description: >-
          The information technology and informatics sciences,
          including software, computational methods, simulation and
          modeling, and digital health technologies.
        meaning: MESH:D000073256
      literature:
        description: >-
          The literature and publications of a domain.
        meaning: MESH:D011642
      medical imaging:
        description: >-
          Techniques and processes for creating visual representations of the interior
          of a body for clinical analysis and medical intervention.
        meaning: MESH:D003952
      microbiology:
        description: >-
          The microbiological sciences, including the study of microbial
          communities (microbiomes) and their influence on hosts and
          environments.
        meaning: MESH:D008829
      neuroscience:
        description: >-
          The scientific study of the nervous system, including
          brain structure, function, and disorders.
        meaning: MESH:D009488
      nutrition:
        description: >-
          The nutritional sciences, including diet and metabolomics.
        meaning: MESH:D052756
      organisms:
        description: >-
          Specific organisms or taxa.
        meaning: NCIT:C14250
      other:
        description: >-
          Another domain not defined here.
      pathways:
        description: >-
          Biological pathways, including metabolic, signaling, and regulatory networks
          that control cellular processes.
        meaning: MESH:D053858
      pharmacology:
        description: >-
          The study of how drugs interact with biological systems, including
          drug discovery, development, and therapeutic uses.
        meaning: MESH:D010600
      phenotype:
        description: >-
          The phenotypes of organisms.
        meaning: MESH:D010641
      precision medicine:
        description: >-
          An approach to disease treatment and prevention that takes into account
          individual variability in genes, environment, and lifestyle.
        meaning: MESH:D057285
      proteomics:
        description: >-
          The large-scale study of proteins, their structures,
          functions, and interactions.
        meaning: MESH:D040901
      public health:
        description: >-
          The science of protecting and improving the health of people and their
          communities, including epidemiology, population health, and the social
          determinants of health.
        meaning: MESH:D011634
      systems biology:
        description: >-
          The computational and mathematical analysis of complex biological systems
          and their interactions.
        meaning: MESH:D049490
      toxicology:
        description: >-
          The study of the adverse effects of chemicals on living organisms.
        meaning: MESH:D014116
      stub:
        description: >-
          This is not a domain, but rather a category for
          resources that are not yet categorized and exist
          only as a placeholder.

  StandardEnum:
    description: >-
      The standard or standards that a product conforms to.
      These are not serializations, but rather the higher-level
      frameworks that the product is built on.
    permissible_values:
      biolink:
        description: >-
          The Biolink Model, a standard for representing
          biological entities and relationships.
        meaning: https://biolink.github.io/biolink-model/
      kghub:
        description: >-
          The KG-Hub standard, which is a general-purpose
          knowledge graph standard.
        meaning: https://kghub.org/

  TagEnum:
    description: >-
      General-purpose tags that can be associated with resources.
    permissible_values:
      biopragmatics:
        description: >-
          A resource or product aggregated by the BioPragmatics project.
      core:
        description: >-
          A core KG-Hub resource.
      translator:
        description: >-
          A resource used by the NCATS Translator program.

  UsageEnum:
    description: >-
      The type of usage of a resource.
    permissible_values:
      actual:
        description: >-
          The resource is actually used in the specified way.
      experimental:
        description: >-
          The resource is used in the specified way for
          experimental purposes.
      theoretical:
        description: >-
          The resource is not used in the specified way, but
          it could be.
      other:
        description: >-
          The resource is used in a way not defined here.

  CollectionEnum:
    description: >-
      Specific collections for grouping KG-Registry entries.
    permissible_values:
      aop:
        description: >-
          This entity incorporates the Adverse Outcome Pathways (AOP)
          framework in some manner.
        meaning: https://aopwiki.org/
      ber:
        description: >-
          A resource or product relevant to the US Department of Energy
          Biological and Environmental Research (BER) program.
        meaning: https://www.energy.gov/science/ber/biological-and-environmental-research
      omop:
        description: >-
          This entity is part of the OMOP Common Data Model ecosystem,
          including vocabularies and related standards used in OHDSI workflows.
        meaning: https://ohdsi.github.io/CommonDataModel/
      translator:
        description: >-
          This entity is part of those developed and used
          by the NCATS Biomedical Translator program.
        meaning: https://ncats.nih.gov/research/research-activities/translator
      obo-foundry:
        description: >-
          This entity is an ontology from the OBO Foundry,
          a collaborative effort to create reference ontologies
          in the biomedical domain.
        meaning: https://obofoundry.org/
      okn:
        description: >-
          This entity is part of the Prototype Open Knowledge Network (OKN),
          a knowledge graph network supported by the National Science Foundation (NSF).
        meaning: https://www.proto-okn.net/
