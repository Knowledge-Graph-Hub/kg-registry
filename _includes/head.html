<!-- Required meta tags -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

{% if page.url == "/" %}
<!-- MUST stay above the stylesheet links below: a parser-inserted script waits
     for pending stylesheets before executing, and the CDN CSS can take seconds.
     Placed here, the registry data request goes out immediately instead of
     queueing behind the CSS. Home page only -- no other page reads this data.
     See issue #662 and assets/js/registry-data.js. -->
<script src="{{ site.baseurl }}/assets/js/registry-data.js"></script>
{% endif %}

<!-- Favicons -->
<link rel="icon" type="image/png" sizes="32x32" href="/kg-registry/images/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/kg-registry/images/favicon-16x16.png">
<link rel="icon" href="/kg-registry/images/favicon.ico" sizes="any">
<link rel="apple-touch-icon" sizes="180x180" href="/kg-registry/images/apple-touch-icon.png">

<!-- Bootstrap CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css">

<!-- Prism.js is for code blocks -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism.css" />

<!-- bootstrap icons, see https://icons.getbootstrap.com/#install -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">

<!-- D3.js Provenance Diagram styles -->
<link rel="stylesheet" href="/kg-registry/assets/css/provenance-diagram.css" />

{% feed_meta %}

<style>

html, body {
    height: 100%;
}

body {
    display: flex;
    flex-flow: column;
    min-width: 0;
}

.footer {
    margin-top: auto;
    padding-top: 1em;
    background-color: #f5f5f5;
}

.filter-column {
    flex: 0 0 215px;
}

/*
Don't underline hyperlinks by default
*/
a {
  text-decoration: none;
  color: #6699cc;
}

/*
Underline and slightly darken hyperlinks
when the cursor hovers over them
*/
a:hover {
  text-decoration: underline;
  color: #5588bb;
}

/*
Don't apply underlines to links
in the navigation menu
*/
.navbar a:hover {
  text-decoration: none;
}

/*
Custom blockquote formatting
*/
.citation-blockquote {
    padding: 5px;
    margin-left: 20px;
    margin-bottom: 16px;
}

.site-container {
    width: min(100%, 1440px);
    margin: 0 auto;
    padding: clamp(1rem, 3vw, 2rem);
    padding-top: clamp(1.25rem, 3vw, 2rem);
    padding-bottom: clamp(1.5rem, 3vw, 2rem);
}

.site-container > .row,
.site-container > .col {
    min-width: 0;
}

.site-container img {
    max-width: 100%;
    height: auto;
}

.site-container h1,
.site-container h2,
.site-container h3,
.site-container h4,
.site-container h5,
.site-container p,
.site-container li,
.site-container td,
.site-container th,
.site-container .card-text,
.site-container .list-group-item,
.site-container .alert {
    overflow-wrap: anywhere;
    word-break: break-word;
}

.header-card-row {
    max-width: calc(72rem + var(--bs-gutter-x));
    margin-bottom: 1.5rem;
}

.resource-product-summary {
    display: block;
}

.resource-product-summary-chart {
    min-width: 0;
}

.resource-product-summary-treemap {
    min-height: 8rem;
    border: 1px solid #dbe5ef;
    border-radius: 0.85rem;
    background:
        radial-gradient(circle at top left, rgba(221, 235, 247, 0.8), transparent 42%),
        linear-gradient(180deg, #fbfdff 0%, #f3f7fb 100%);
    padding: 0.5rem;
}

.resource-product-summary-treemap svg {
    display: block;
    width: 100%;
    height: auto;
}

.registry-counts {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem 0.75rem;
    align-items: center;
}

.registry-filter-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    align-items: flex-end;
}

.loading-indicator {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    color: #6c757d;
}

/* Marks the end of the rendered rows; rows are appended as it comes into view */
#table-sentinel .loading-indicator {
    padding: 1rem;
}

.registry-filter {
    flex: 1 1 12rem;
    min-width: min(100%, 12rem);
}

.registry-filter label {
    display: block;
    margin-bottom: 0.25rem;
}

.registry-table-wrapper,
.table-responsive {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
}

.registry-table-wrapper table {
    min-width: 900px;
}

#results table {
    min-width: 640px;
}

.example-query-list {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
}

.example-query-list .btn {
    margin: 0 !important;
    text-align: left;
    white-space: normal;
}

.btn-group {
    flex-wrap: wrap;
}

.btn-group > .btn {
    flex: 0 0 auto;
}

.form-control,
.form-select,
textarea {
    max-width: 100%;
}

@media (max-width: 576px) {
    .site-container {
        padding-inline: 0.875rem;
        padding-top: 1rem;
    }

    .registry-filter {
        flex-basis: 100%;
        min-width: 0;
    }

    .navbar .container-fluid {
        align-items: flex-start;
    }

    .navbar-brand {
        margin-right: 0.5rem;
    }
}
</style>

<style>
/* Dashed underline for eval question cells with tooltips */
td[data-bs-toggle="tooltip"] {
  text-decoration: underline;
  text-decoration-style: dashed;
  text-underline-offset: 2px;
  cursor: help;
}
</style>
